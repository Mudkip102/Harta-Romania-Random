<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harta României - Funcțională 100%</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; }
        #map { height: 100vh; width: 100%; }
        
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 300px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 25px;
            transition: 0.3s;
        }

        button:hover { background: #d35400; transform: scale(1.05); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* Animație Săgeată */
        .arrow-marker {
            animation: dropBounce 0.8s ease-out forwards;
        }

        @keyframes dropBounce {
            0% { transform: translateY(-500px); opacity: 0; }
            60% { transform: translateY(0); opacity: 1; }
            80% { transform: translateY(-15px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="ui-panel">
    <span id="status">⏳ Se încarcă harta...</span>
    <button id="btn" onclick="pickRandomPoint()" disabled>Alege Punct</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map', { zoomControl: false }).setView([45.9432, 24.9668], 7);
    let polygonData = null; 
    let currentMarker = null;

    // Stil hartă Dark Mode
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '©OpenStreetMap'
    }).addTo(map);

    // Încărcăm granița oficială
    fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries/ROU.geo.json')
    .then(res => res.json())
    .then(data => {
        // IMPORTANT: Luăm prima trăsătură din FeatureCollection
        polygonData = data.features[0]; 
        
        L.geoJSON(data, {
            style: { color: "#3498db", weight: 2, fillOpacity: 0.1 }
        }).addTo(map);

        document.getElementById('status').innerText = "România Gata ✅";
        document.getElementById('btn').disabled = false;
    })
    .catch(err => {
        document.getElementById('status').innerText = "Eroare la încărcare ❌";
        console.error(err);
    });

    function pickRandomPoint() {
        if (!polygonData) return;

        // Ștergem markerul vechi
        if (currentMarker) map.removeLayer(currentMarker);

        // 1. Calculăm limitele (Bounding Box)
        const bbox = turf.bbox(polygonData); // [minLng, minLat, maxLng, maxLat]
        
        let pointInside = false;
        let randomLng, randomLat;

        // 2. Bucla de siguranță: generăm până găsim un punct în interior
        // Limităm la 100 de încercări pentru a preveni blocarea browserului
        let attempts = 0;
        while (!pointInside && attempts < 100) {
            randomLng = Math.random() * (bbox[2] - bbox[0]) + bbox[0];
            randomLat = Math.random() * (bbox[3] - bbox[1]) + bbox[1];
            
            let point = turf.point([randomLng, randomLat]);
            
            if (turf.booleanPointInPolygon(point, polygonData)) {
                pointInside = true;
            }
            attempts++;
        }

        // 3. Afișăm rezultatul
        if (pointInside) {
            const arrowSvg = `
                <svg class="arrow-marker" width="40" height="40" viewBox="0 0 24 24">
                    <path d="M12 2L12 18M12 18L5 11M12 18L19 11" stroke="#ff4757" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="21" r="2" fill="#ff4757"/>
                </svg>`;

            const icon = L.divIcon({
                html: arrowSvg,
                iconSize: [40, 40],
                iconAnchor: [20, 40],
                className: 'dummy'
            });

            currentMarker = L.marker([randomLat, randomLng], { icon: icon }).addTo(map);
            
            map.flyTo([randomLat, randomLng], 10, { duration: 1.2 });
        }
    }
</script>

</body>
</html>
